<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Test Carte</title>

    <!-- 1. Le CSS de Leaflet (Indispensable pour assembler les morceaux de carte) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* On force la carte à occuper une zone bien visible */
        #map {
            width: 100%;
            height: 600px;
            background-color: #eee;
            /* Fond gris en attendant les images */
        }
    </style>
</head>

<body>

    <h2>Ma première carte Leaflet</h2>

    <!-- Le conteneur HTML de la carte -->
    <div id="map"></div>

    <!-- 2. Le script JS de Leaflet (Avec le bon attribut 'src') -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Initialiser la carte centrée sur Madagascar
const map = L.map('map').setView([-18.7669, 46.8691], 6);

// 2. Ajouter le fond de carte OpenStreetMap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

// 3. AFFICHAGE DES MARQUEURS AU DÉMARRAGE
fetch('http://localhost:8080/api/parcs')
    .then(response => response.json())
    .then(parcs => {
        parcs.forEach(parc => {
            if (parc.lat && parc.lng) {
                L.marker([parc.lat, parc.lng])
                    .addTo(map)
                    .bindPopup(`<b>${parc.nom}</b><br>ID: ${parc.id}`);
            }
        });
    })
    .catch(error => console.error("Erreur d'API :", error));

// 4. LOGIQUE DE CLIC ET DE PROXIMITÉ (Bien séparée à l'extérieur !)
map.on('click', function(e) {
    const lat = e.latlng.lat;
    const lng = e.latlng.lng;
    const rayonKm = 200; // Tu peux repasser à 200km pour tester la précision
    
    fetch(`http://localhost:8080/api/parcs/proximite?lng=${lng}&lat=${lat}&rayonKm=${rayonKm}`)
        .then(response => response.json())
        .then(parcsProches => {
            if (parcsProches.length > 0) {
                const nomsParcs = parcsProches.map(p => p.nom).join(", ");
                alert(`🌲 Parc(s) national(aux) proche(s) (dans un rayon de ${rayonKm}km) :\n- ${nomsParcs}`);
            } else {
                alert(`❌ Aucun parc national à proximité immédiate (dans un rayon de ${rayonKm}km).`);
            }
        })
        .catch(error => {
            console.error("Erreur lors de la recherche de proximité :", error);
            alert("Impossible de contacter le serveur pour la recherche de proximité.");
        });
});
    </script>
</body>

</html>
